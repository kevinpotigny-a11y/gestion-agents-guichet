<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Planning guichets — vue d'ensemble</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root{
    --cyan: #4FD1E3;
    --rouge: #B23A32;
    --violet: #D8C7F0;
    --ambre: #F4A340;
    --vert-vacances: #D3EFD0;
    --bordure: #DADDE1;
    --texte: #2A2E33;
    --fond: #FAFBFC;
    --entete: #1F2933;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    color:var(--texte);
    background:var(--fond);
    font-size:13px;
  }
  #barre{
    display:flex;
    align-items:center;
    gap:14px;
    padding:10px 14px;
    background:var(--entete);
    color:white;
    position:sticky;
    top:0;
    z-index:30;
    flex-wrap:wrap;
  }
  #barre button{
    background:#3A4552;
    border:none;
    color:white;
    padding:6px 12px;
    border-radius:5px;
    cursor:pointer;
    font-size:13px;
  }
  #barre button:hover{ background:#4A5563; }
  #titreMois{
    font-weight:600;
    min-width:150px;
    text-align:center;
    text-transform:capitalize;
  }
  #barre select{
    padding:5px 8px;
    border-radius:5px;
    border:none;
    font-size:13px;
  }
  #statut{
    margin-left:auto;
    font-size:12px;
    opacity:0.8;
  }
  #conteneur{
    overflow:auto;
    height:calc(100vh - 46px);
  }
  table{
    border-collapse:separate;
    border-spacing:0;
    width:100%;
    user-select:none;
  }
  td.cellule.enSelection{ box-shadow: inset 0 0 0 9999px rgba(31,41,51,0.18); }
  th, td{
    border-right:1px solid var(--bordure);
    border-bottom:1px solid var(--bordure);
    text-align:center;
    padding:0;
    min-width:30px;
    height:28px;
  }
  th.nouvelleSemaine, td.nouvelleSemaine{ border-left:2px solid #9AA3AD; }
  th.vacances{ background:var(--vert-vacances) !important; }
  th.ferme, td.ferme{
    background:repeating-linear-gradient(45deg, #E4E6E9, #E4E6E9 6px, #D6D9DD 6px, #D6D9DD 12px) !important;
  }
  td.ferme .moitie{ cursor:not-allowed; pointer-events:none; }
  th.fermeturePublic{ background:#FCE8CC !important; }
  .puceRappel{
    display:inline-block;
    font-size:10px;
    margin-left:2px;
  }
  th.colAgent, td.colAgent{
    min-width:170px;
    text-align:left;
    padding-left:8px;
    position:sticky;
    left:0;
    background:white;
    z-index:10;
    font-weight:500;
    white-space:nowrap;
    cursor:pointer;
  }
  th.colAgent:hover, td.colAgent:hover{ text-decoration:underline; }
  tr.ligneActive td.colAgent{ background:#FFF3D6; }
  tr.ligneActive td.cellule{ box-shadow: inset 0 0 0 9999px rgba(255,214,102,0.12); }
  thead th{
    position:sticky;
    top:0;
    background:#EEF1F4;
    z-index:20;
    font-weight:600;
    padding:4px 2px;
  }
  thead th.colAgent{
    z-index:25;
    background:#EEF1F4;
    cursor:default;
  }
  thead tr.joursSemaine th{ font-size:10px; color:#6B7280; font-weight:400; }
  tr.groupe td{
    background:#DDE3EA;
    font-weight:700;
    text-align:left;
    padding-left:8px;
    position:sticky;
    left:0;
  }
  tr.sousSeparateur td{
    border-top:2px solid #9AA3AD;
    padding:0;
    height:0;
    line-height:0;
  }
  td.cellule{ padding:0; position:relative; }
  .moitie{
    height:50%;
    cursor:pointer;
    position:relative;
  }
  .moitie:hover{ outline:2px solid #1F2933; outline-offset:-2px; z-index:1; }
  .moitie.matin{ border-bottom:1px dashed rgba(0,0,0,0.12); }
  .moitie.conges{ background:var(--cyan); }
  .moitie.formation{ background:var(--rouge); }
  .moitie.teletravail{ background:transparent; }
  .moitie.tempspartiel{ background:var(--ambre); }
  .moitie.autres{ background:var(--violet); }
  .lettreT{
    position:absolute;
    left:0; right:0; top:0; bottom:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    font-weight:400;
    color:#8A93A0;
    pointer-events:none;
  }
  .aujourdhui{ box-shadow: inset 0 0 0 2px #1F2933; }
  #legende{
    display:flex;
    gap:16px;
    padding:8px 14px;
    flex-wrap:wrap;
    font-size:12px;
    border-top:1px solid var(--bordure);
    background:white;
  }
  .puce{ display:inline-flex; align-items:center; gap:5px; }
  .carre{ width:13px; height:13px; border-radius:3px; display:inline-block; border:1px solid var(--bordure); }
  #erreur{
    padding:20px;
    color:#B23A32;
    font-size:14px;
  }
  #popup{
    position:fixed;
    background:white;
    border:1px solid var(--bordure);
    border-radius:8px;
    box-shadow:0 6px 20px rgba(0,0,0,0.18);
    padding:8px;
    z-index:100;
    display:none;
    min-width:210px;
  }
  #popup .entete{
    font-size:12px;
    font-weight:600;
    padding:4px 6px 4px;
  }
  #popup .sousMoment{
    font-size:11px;
    color:#6B7280;
    padding:0 6px 8px;
    border-bottom:1px solid var(--bordure);
    margin-bottom:6px;
  }
  #popup label.toggle{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    padding:4px 6px 8px;
    border-bottom:1px solid var(--bordure);
    margin-bottom:4px;
  }
  #popup button{
    display:flex;
    align-items:center;
    gap:8px;
    width:100%;
    text-align:left;
    padding:7px 8px;
    border:none;
    background:none;
    border-radius:5px;
    cursor:pointer;
    font-size:13px;
    color:var(--texte);
  }
  #popup button:hover{ background:#F1F2F4; }
  #popup button.supprimer{ color:var(--rouge); margin-top:4px; border-top:1px solid var(--bordure); border-radius:0; padding-top:9px; }
  #popup .pastille{ width:12px; height:12px; border-radius:3px; border:1px solid var(--bordure); flex-shrink:0; }
  #popup .info{
    font-size:11px;
    color:#6B7280;
    padding:4px 6px 2px;
  }
  #popup .groupeRadio{
    padding:4px 6px 8px;
    font-size:12px;
    border-bottom:1px solid var(--bordure);
    margin-bottom:4px;
  }
  #popup .groupeRadio .titreRadio{ font-weight:600; margin-bottom:3px; }
  #popup .groupeRadio label{ display:inline-flex; align-items:center; gap:4px; margin-right:12px; font-weight:400; cursor:pointer; }
</style>
</head>
<body>

<div id="barre">
  <button id="btnPrev">‹</button>
  <div id="titreMois">—</div>
  <button id="btnNext">›</button>
  <select id="filtrePole"><option value="">Tous les pôles</option></select>
  <label style="display:flex;align-items:center;gap:5px;">
    <input type="checkbox" id="filtreGuichet"> Guichet uniquement
  </label>
  <div id="statut">Chargement…</div>
</div>

<div id="conteneur">
  <table id="grille"><thead></thead><tbody></tbody></table>
  <div id="erreur" style="display:none;"></div>
</div>

<div id="legende">
  <span class="puce"><span class="carre" style="background:var(--cyan);"></span>Congés / RTT</span>
  <span class="puce"><span class="carre" style="background:var(--rouge);"></span>Formation</span>
  <span class="puce"><span class="carre" style="background:white;">T</span>Télétravail</span>
  <span class="puce"><span class="carre" style="background:var(--ambre);"></span>Temps partiel</span>
  <span class="puce"><span class="carre" style="background:var(--violet);"></span>Autres</span>
  <span class="puce"><span class="carre" style="background:var(--vert-vacances);"></span>Vacances scolaires</span>
  <span class="puce"><span class="carre" style="background:repeating-linear-gradient(45deg, #E4E6E9, #E4E6E9 3px, #D6D9DD 3px, #D6D9DD 6px);"></span>Jour férié / Fermeture préf. 🔔=rappel Casper</span>
  <span class="puce"><span class="carre" style="background:#FCE8CC;"></span>Fermeture au public</span>
</div>

<div id="popup"></div>

<script>
function normalise(s){
  return (s||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]/g,'');
}
function trouverCle(objKeys, candidats){
  const norm = objKeys.map(k => ({orig:k, n:normalise(k)}));
  for(const cand of candidats){
    const c = normalise(cand);
    const trouve = norm.find(x => x.n === c);
    if(trouve) return trouve.orig;
  }
  for(const cand of candidats){
    const c = normalise(cand);
    const trouve = norm.find(x => x.n.includes(c));
    if(trouve) return trouve.orig;
  }
  return null;
}
function versDate(valeur){
  if(valeur === null || valeur === undefined || valeur === '') return null;
  if(typeof valeur === 'number') return new Date(valeur * 1000);
  const d = new Date(valeur);
  return isNaN(d) ? null : d;
}
function jourUTC(d){
  return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
}
function versTimestampGrist(anneeMoisJourUTC){
  return Math.floor(anneeMoisJourUTC / 1000);
}
function toRows(colTable){
  const ids = colTable.id;
  const rows = [];
  for(let i=0;i<ids.length;i++){
    const row = {_id: ids[i]};
    for(const cle in colTable){
      if(cle === 'id') continue;
      row[cle] = colTable[cle][i];
    }
    rows.push(row);
  }
  return rows;
}

const TYPES = [
  {id:'Congés/RTT', classe:'conges', var:'cyan', libelle:'Congés / RTT'},
  {id:'Formation', classe:'formation', var:'rouge', libelle:'Formation'},
  {id:'Télétravail', classe:'teletravail', var:null, libelle:'Télétravail'},
  {id:'Temps partiel', classe:'tempspartiel', var:'ambre', libelle:'Temps partiel'},
  {id:'Autres', classe:'autres', var:'violet', libelle:'Autres'}
];

const ORDRE_POLES = ['direction', 'polesejour', 'polecontentieux', 'poleeloignement', 'poletransverse', 'pointdaccueilnumerique'];

const VACANCES_SCOLAIRES = [
  {debut: '2026-07-04', fin: '2026-09-01', libelle: "Vacances d'été 2026"},
  {debut: '2026-10-17', fin: '2026-11-02', libelle: 'Vacances de la Toussaint 2026'},
  {debut: '2026-12-19', fin: '2027-01-04', libelle: 'Vacances de Noël 2026'},
  {debut: '2027-02-13', fin: '2027-03-01', libelle: "Vacances d'hiver 2027"},
  {debut: '2027-04-10', fin: '2027-04-26', libelle: 'Vacances de printemps 2027'},
  {debut: '2027-05-07', fin: '2027-05-07', libelle: "Pont de l'Ascension 2027"},
  {debut: '2027-07-03', fin: '2027-09-01', libelle: "Vacances d'été 2027"}
];

function trouverJourSpecial(jTS){
  return joursSpeciaux.find(j => j.jTS === jTS) || null;
}

function estVacancesScolaires(d){
  const ts = jourUTC(d);
  return VACANCES_SCOLAIRES.some(v => {
    const debTS = jourUTC(new Date(v.debut + 'T00:00:00Z'));
    const finTS = jourUTC(new Date(v.fin + 'T00:00:00Z'));
    return ts >= debTS && ts <= finTS;
  });
}

let moisCourant = new Date();
moisCourant.setDate(1);
let agents = [];
let absences = [];
let clesAgent = {};
let clesAbs = {};
let clesJS = {};
let joursSpeciaux = [];
let poleActif = '';
let guichetSeulement = false;
let agentSurligne = null;
let ignorerProchainClicDocument = false;
let joursCourants = [];
let lignesRendues = [];
let cellulesParPosition = {};
let glisser = {actif:false, ligneDebut:null, colDebut:null, ligneFin:null, colFin:null,
  agentOrigine:null, jTSOrigine:null, estMatinOrigine:null, absExistanteOrigine:null,
  verrouilleeOrigine:null, elementOrigine:null};

const NOMS_MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const JOURS = ['L','M','M','J','V'];

grist.ready({requiredAccess: 'full'});

async function chargerDonnees(){
  document.getElementById('statut').textContent = 'Chargement…';
  document.getElementById('erreur').style.display = 'none';
  try{
    let tableAgents, tableAbs;
    for(const nom of ['Agents','AGENTS','Agent']){
      try{ tableAgents = await grist.docApi.fetchTable(nom); break; } catch(e){}
    }
    for(const nom of ['Absences','ABSENCES','Absence']){
      try{ tableAbs = await grist.docApi.fetchTable(nom); break; } catch(e){}
    }
    if(!tableAgents || !tableAbs){
      throw new Error("Impossible de trouver les tables 'Agents' et/ou 'Absences'. Vérifie leur nom exact dans Grist.");
    }

    agents = toRows(tableAgents);
    absences = toRows(tableAbs);

    const clesA = Object.keys(tableAgents).filter(k => k !== 'id');
    clesAgent = {
      nom: trouverCle(clesA, ['Nom']),
      prenom: trouverCle(clesA, ['Prenom','Prénom']),
      pole: trouverCle(clesA, ['Pole','Pôle']),
      role: trouverCle(clesA, ['Role','Rôle']),
      guichet: trouverCle(clesA, ['Guichet'])
    };

    const clesB = Object.keys(tableAbs).filter(k => k !== 'id');
    const clesMatin = clesB.filter(k => normalise(k).includes('matin'));

    clesAbs = {
      agent: trouverCle(clesB, ['Agent']),
      debut: trouverCle(clesB, ['Datedebut','Date_debut','DateDebut']),
      fin: trouverCle(clesB, ['Datefin','Date_fin','DateFin']),
      type: trouverCle(clesB, ['Type']),
      debutDemi: clesMatin[0] || null,
      finDemi: clesMatin[1] || null
    };

    if(!clesAgent.nom || !clesAbs.agent || !clesAbs.debut || !clesAbs.fin || !clesAbs.type){
      throw new Error("Certaines colonnes attendues (Nom, Agent, Date début, Date fin, Type) sont introuvables. Vérifie les noms de colonnes dans tes tables.");
    }

    // Table optionnelle : fermetures et journées spéciales (aucune erreur si elle n'existe pas encore)
    joursSpeciaux = [];
    clesJS = {};
    let tableJS = null;
    for(const nom of ['JoursSpeciaux', 'JOURSSPECIAUX', 'JoursSpéciaux']){
      try{ tableJS = await grist.docApi.fetchTable(nom); break; } catch(e){}
    }
    if(tableJS){
      const lignesJS = toRows(tableJS);
      const clesJSBrutes = Object.keys(tableJS).filter(k => k !== 'id');
      clesJS = {
        date: trouverCle(clesJSBrutes, ['Date']),
        libelle: trouverCle(clesJSBrutes, ['Libelle', 'Libellé']),
        categorie: trouverCle(clesJSBrutes, ['Categorie', 'Catégorie']),
        rappel: trouverCle(clesJSBrutes, ['RappelCasper'])
      };
      if(clesJS.date && clesJS.categorie){
        joursSpeciaux = lignesJS.map(l => {
          const d = versDate(l[clesJS.date]);
          return d ? {
            jTS: jourUTC(d),
            libelle: clesJS.libelle ? l[clesJS.libelle] : '',
            categorie: normalise(l[clesJS.categorie] || ''),
            rappel: clesJS.rappel ? !!l[clesJS.rappel] : false
          } : null;
        }).filter(Boolean);
      }
    }

    remplirFiltrePole();
    document.getElementById('statut').textContent = agents.length + ' agents · ' + absences.length + ' absences';
    dessiner();
  }catch(err){
    document.getElementById('statut').textContent = 'Erreur';
    const zone = document.getElementById('erreur');
    zone.style.display = 'block';
    zone.textContent = '⚠ ' + err.message;
  }
}

function remplirFiltrePole(){
  const sel = document.getElementById('filtrePole');
  const valeurActuelle = sel.value;
  const poles = [...new Set(agents.map(a => a[clesAgent.pole]).filter(Boolean))];
  const poleOrdonnes = trierPoles(poles);
  sel.innerHTML = '<option value="">Tous les pôles</option>' + poleOrdonnes.map(p => `<option value="${p}">${p}</option>`).join('');
  sel.value = valeurActuelle;
}

function trierPoles(listePoles){
  return [...listePoles].sort((a, b) => {
    const ia = ORDRE_POLES.indexOf(normalise(a));
    const ib = ORDRE_POLES.indexOf(normalise(b));
    if(ia === -1 && ib === -1) return a.localeCompare(b);
    if(ia === -1) return 1;
    if(ib === -1) return -1;
    return ia - ib;
  });
}

function estContractuel(agent){
  return normalise(agent[clesAgent.role] || '').includes('contractuel');
}

function typeVersClasse(type){
  const t = normalise(type);
  if(t.includes('conge') || t.includes('rtt')) return 'conges';
  if(t.includes('formation')) return 'formation';
  if(t.includes('teletravail')) return 'teletravail';
  if(t.includes('tempspartiel')) return 'tempspartiel';
  return 'autres';
}

function demiJourActives(ab, jTS, debTS, finTS){
  let matin = true, apresmidi = true;
  if(jTS === debTS && clesAbs.debutDemi){
    const dd = normalise(ab[clesAbs.debutDemi] || '');
    if(dd.includes('apresmidi')) matin = false;
  }
  if(jTS === finTS && clesAbs.finDemi){
    const fd = normalise(ab[clesAbs.finDemi] || '');
    if(fd.includes('matin')) apresmidi = false;
  }
  return {matin, apresmidi};
}

function trouverAbsencePourMoitie(absencesAgent, jTS, estMatin){
  for(const ab of absencesAgent){
    const deb = versDate(ab[clesAbs.debut]);
    const fin = versDate(ab[clesAbs.fin]) || deb;
    if(!deb) continue;
    const debTS = jourUTC(deb), finTS = jourUTC(fin);
    if(jTS < debTS || jTS > finTS) continue;
    const {matin, apresmidi} = demiJourActives(ab, jTS, debTS, finTS);
    if(estMatin && matin) return {absence: ab, debTS, finTS};
    if(!estMatin && apresmidi) return {absence: ab, debTS, finTS};
  }
  return null;
}

function dessiner(){
  fermerPopup();
  joursCourants = [];
  lignesRendues = [];
  cellulesParPosition = {};
  const annee = moisCourant.getFullYear();
  const mois = moisCourant.getMonth();
  document.getElementById('titreMois').textContent = NOMS_MOIS[mois] + ' ' + annee;

  const nbJours = new Date(Date.UTC(annee, mois + 1, 0)).getUTCDate();
  const jours = [];
  for(let i=0;i<nbJours;i++){
    const d = new Date(Date.UTC(annee, mois, i+1));
    const jourSemaine = d.getUTCDay();
    if(jourSemaine === 0 || jourSemaine === 6) continue;
    jours.push(d);
  }
  const aujourdhui = jourUTC(new Date());
  joursCourants = jours;

  let agentsAffiches = agents.filter(a => {
    if(poleActif && a[clesAgent.pole] !== poleActif) return false;
    if(guichetSeulement && !a[clesAgent.guichet]) return false;
    return true;
  });

  const groupes = {};
  agentsAffiches.forEach(a => {
    const p = a[clesAgent.pole] || 'Non renseigné';
    if(!groupes[p]) groupes[p] = [];
    groupes[p].push(a);
  });

  const nomsGroupesOrdonnes = trierPoles(Object.keys(groupes));

  nomsGroupesOrdonnes.forEach(nomGroupe => {
    const estPoleSejour = normalise(nomGroupe).includes('polesejour');
    groupes[nomGroupe].sort((x, y) => {
      if(estPoleSejour){
        const gx = x[clesAgent.guichet] ? 0 : 1;
        const gy = y[clesAgent.guichet] ? 0 : 1;
        if(gx !== gy) return gx - gy;
        // Au sein du même groupe (guichet ou non-guichet), les contractuels passent en dernier
        const cx = estContractuel(x) ? 1 : 0;
        const cy = estContractuel(y) ? 1 : 0;
        if(cx !== cy) return cx - cy;
      }
      return (x[clesAgent.nom]||'').localeCompare(y[clesAgent.nom]||'');
    });
  });

  function estDebutSemaine(d){ return d.getUTCDay() === 1; }

  const thead = document.querySelector('#grille thead');
  thead.innerHTML = '';
  const trJours = document.createElement('tr');
  const thAngle = document.createElement('th');
  thAngle.className = 'colAgent';
  thAngle.textContent = 'Agent';
  thAngle.rowSpan = 2;
  trJours.appendChild(thAngle);
  jours.forEach(d => {
    const th = document.createElement('th');
    th.textContent = d.getUTCDate();
    if(estDebutSemaine(d)) th.classList.add('nouvelleSemaine');
    if(jourUTC(d) === aujourdhui) th.classList.add('aujourdhui');
    if(estVacancesScolaires(d)) th.classList.add('vacances');
    const js = trouverJourSpecial(jourUTC(d));
    if(js){
      if(js.categorie === 'jourferie' || js.categorie === 'fermeturepref'){
        th.classList.add('ferme');
        if(js.rappel) th.innerHTML += ' <span class="puceRappel" title="' + (js.libelle||'') + ' — jour à poser en Casper">🔔</span>';
      } else if(js.categorie === 'fermeturepublic'){
        th.classList.add('fermeturePublic');
      }
      th.title = js.libelle || '';
    }
    trJours.appendChild(th);
  });
  thead.appendChild(trJours);

  const trLettres = document.createElement('tr');
  trLettres.className = 'joursSemaine';
  jours.forEach(d => {
    const th = document.createElement('th');
    th.textContent = JOURS[d.getUTCDay()-1];
    if(estDebutSemaine(d)) th.classList.add('nouvelleSemaine');
    if(estVacancesScolaires(d)) th.classList.add('vacances');
    const js = trouverJourSpecial(jourUTC(d));
    if(js){
      if(js.categorie === 'jourferie' || js.categorie === 'fermeturepref') th.classList.add('ferme');
      else if(js.categorie === 'fermeturepublic') th.classList.add('fermeturePublic');
      th.title = js.libelle || '';
    }
    trLettres.appendChild(th);
  });
  thead.appendChild(trLettres);

  const tbody = document.querySelector('#grille tbody');
  tbody.innerHTML = '';

  nomsGroupesOrdonnes.forEach(nomGroupe => {
    const trGroupe = document.createElement('tr');
    trGroupe.className = 'groupe';
    const tdGroupe = document.createElement('td');
    tdGroupe.colSpan = jours.length + 1;
    tdGroupe.textContent = nomGroupe;
    trGroupe.appendChild(tdGroupe);
    tbody.appendChild(trGroupe);

    const estPoleSejour = normalise(nomGroupe).includes('polesejour');
    let dernierEtaitGuichet = null;

    groupes[nomGroupe].forEach(agent => {
      if(estPoleSejour){
        const estGuichet = !!agent[clesAgent.guichet];
        if(dernierEtaitGuichet === true && estGuichet === false){
          const trSep = document.createElement('tr');
          trSep.className = 'sousSeparateur';
          const tdSep = document.createElement('td');
          tdSep.colSpan = jours.length + 1;
          trSep.appendChild(tdSep);
          tbody.appendChild(trSep);
        }
        dernierEtaitGuichet = estGuichet;
      }

      const tr = document.createElement('tr');
      if(agentSurligne === agent._id) tr.classList.add('ligneActive');
      const ligneIndex = lignesRendues.length;
      lignesRendues.push(agent);

      const tdNom = document.createElement('td');
      tdNom.className = 'colAgent';
      tdNom.textContent = (agent[clesAgent.nom]||'') + (clesAgent.prenom && agent[clesAgent.prenom] ? ' ' + agent[clesAgent.prenom] : '');
      tdNom.onclick = () => {
        agentSurligne = (agentSurligne === agent._id) ? null : agent._id;
        dessiner();
      };
      tr.appendChild(tdNom);

      const absencesAgent = absences.filter(ab => ab[clesAbs.agent] === agent._id);

      jours.forEach((d, colIndex) => {
        const td = document.createElement('td');
        td.className = 'cellule';
        td.dataset.ligne = ligneIndex;
        td.dataset.col = colIndex;
        cellulesParPosition[ligneIndex + '_' + colIndex] = td;
        const jTS = jourUTC(d);
        if(estDebutSemaine(d)) td.classList.add('nouvelleSemaine');
        if(jTS === aujourdhui) td.classList.add('aujourdhui');
        const jourSpecial = trouverJourSpecial(jTS);
        const estFerme = jourSpecial && (jourSpecial.categorie === 'jourferie' || jourSpecial.categorie === 'fermeturepref');
        if(estFerme) td.classList.add('ferme');

        let uneEstTeletravail = false;

        [true, false].forEach(estMatin => {
          const div = document.createElement('div');
          div.className = 'moitie ' + (estMatin ? 'matin' : 'apresmidi');
          const trouve = trouverAbsencePourMoitie(absencesAgent, jTS, estMatin);
          let verrouillee = false;
          let absExistante = null;
          if(trouve){
            const type = trouve.absence[clesAbs.type];
            const classe = typeVersClasse(type);
            div.classList.add(classe);
            if(classe === 'teletravail') uneEstTeletravail = true;
            verrouillee = trouve.debTS !== trouve.finTS;
            absExistante = trouve.absence;
            div.title = (agent[clesAgent.nom]||'') + ' — ' + type + ' (' + (estMatin ? 'matin' : 'après-midi') + ')' + (verrouillee ? ' — période multi-jours' : '');
          } else if(estFerme){
            div.title = jourSpecial.libelle || 'Jour fermé';
          } else {
            div.title = 'Cliquer, ou cliquer-glisser pour sélectionner plusieurs cases (' + (estMatin ? 'matin' : 'après-midi') + ')';
          }
          if(!estFerme){
            div.onmousedown = (e) => demarrerGlisser(e, agent, jTS, ligneIndex, colIndex, estMatin, absExistante, verrouillee);
          }
          td.appendChild(div);
        });

        if(uneEstTeletravail){
          const lettre = document.createElement('div');
          lettre.className = 'lettreT';
          lettre.textContent = 'T';
          td.appendChild(lettre);
        }

        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  });
}

function fermerPopup(){
  document.getElementById('popup').style.display = 'none';
  viderSurbrillance();
}
function demarrerGlisser(e, agent, jTS, ligneIndex, colIndex, estMatin, absExistante, verrouillee){
  if(e.button !== 0) return; // clic gauche uniquement
  e.preventDefault();
  glisser = {
    actif: true,
    ligneDebut: ligneIndex, colDebut: colIndex,
    ligneFin: ligneIndex, colFin: colIndex,
    agentOrigine: agent, jTSOrigine: jTS, estMatinOrigine: estMatin,
    absExistanteOrigine: absExistante, verrouilleeOrigine: verrouillee,
    elementOrigine: e.target
  };
  mettreAJourSurbrillance();
  document.addEventListener('mousemove', gererMouseMoveGlisser);
  document.addEventListener('mouseup', gererMouseUpGlisser);
}

function gererMouseMoveGlisser(e){
  if(!glisser.actif) return;
  const cible = document.elementFromPoint(e.clientX, e.clientY);
  const td = cible && cible.closest ? cible.closest('td.cellule') : null;
  if(!td || td.dataset.ligne === undefined) return;
  const ligne = parseInt(td.dataset.ligne, 10);
  const col = parseInt(td.dataset.col, 10);
  if(ligne === glisser.ligneFin && col === glisser.colFin) return;
  glisser.ligneFin = ligne;
  glisser.colFin = col;
  mettreAJourSurbrillance();
}

function gererMouseUpGlisser(e){
  document.removeEventListener('mousemove', gererMouseMoveGlisser);
  document.removeEventListener('mouseup', gererMouseUpGlisser);
  if(!glisser.actif) return;
  glisser.actif = false;

  const estClicSimple = (glisser.ligneDebut === glisser.ligneFin && glisser.colDebut === glisser.colFin);

  if(estClicSimple){
    viderSurbrillance();
    ignorerProchainClicDocument = true;
    const evtSynthetique = {target: glisser.elementOrigine, stopPropagation(){}};
    ouvrirPopup(evtSynthetique, glisser.agentOrigine, glisser.jTSOrigine, glisser.absExistanteOrigine, glisser.verrouilleeOrigine, glisser.estMatinOrigine);
  } else {
    const ligneMin = Math.min(glisser.ligneDebut, glisser.ligneFin);
    const ligneMax = Math.max(glisser.ligneDebut, glisser.ligneFin);
    const colMin = Math.min(glisser.colDebut, glisser.colFin);
    const colMax = Math.max(glisser.colDebut, glisser.colFin);
    ignorerProchainClicDocument = true;
    ouvrirPopupMultiple(ligneMin, ligneMax, colMin, colMax, glisser.elementOrigine);
  }
}

function mettreAJourSurbrillance(){
  viderSurbrillance();
  const ligneMin = Math.min(glisser.ligneDebut, glisser.ligneFin);
  const ligneMax = Math.max(glisser.ligneDebut, glisser.ligneFin);
  const colMin = Math.min(glisser.colDebut, glisser.colFin);
  const colMax = Math.max(glisser.colDebut, glisser.colFin);
  for(let l = ligneMin; l <= ligneMax; l++){
    for(let c = colMin; c <= colMax; c++){
      const td = cellulesParPosition[l + '_' + c];
      if(td) td.classList.add('enSelection');
    }
  }
}

function viderSurbrillance(){
  document.querySelectorAll('td.cellule.enSelection').forEach(td => td.classList.remove('enSelection'));
}


function ouvrirPopup(evt, agent, jTS, absExistante, verrouillee, estMatin){

  const popup = document.getElementById('popup');

  if(verrouillee){
    popup.innerHTML = `
      <div class="entete">${nomAgent}<br>${dateLisible}</div>
      <div class="info">Cette case fait partie d'une absence sur plusieurs jours (${absExistante[clesAbs.type]}).</div>
    `;
    const btnDemi = document.createElement('button');
    btnDemi.textContent = 'Supprimer cette demi-journée (' + (estMatin ? 'matin' : 'après-midi') + ')';
    btnDemi.onclick = () => supprimerPartiel(absExistante, jTS, estMatin ? 'demi-matin' : 'demi-apresmidi');
    popup.appendChild(btnDemi);

    const btnJournee = document.createElement('button');
    btnJournee.textContent = 'Supprimer cette journée entière';
    btnJournee.onclick = () => supprimerPartiel(absExistante, jTS, 'journee');
    popup.appendChild(btnJournee);

    const btnPeriode = document.createElement('button');
    btnPeriode.className = 'supprimer';
    btnPeriode.textContent = 'Supprimer toute la période';
    btnPeriode.onclick = () => supprimerAbsence(absExistante);
    popup.appendChild(btnPeriode);
  } else {
    popup.innerHTML = `
      <div class="entete">${nomAgent}<br>${dateLisible}</div>
      <div class="sousMoment">${estMatin ? 'Matin' : 'Après-midi'} sélectionné</div>
    `;
    const labelToggle = document.createElement('label');
    labelToggle.className = 'toggle';
    labelToggle.innerHTML = `<input type="checkbox" id="chkJourneeEntiere"> Toute la journée (matin + après-midi)`;
    popup.appendChild(labelToggle);

    TYPES.forEach(t => {
      const btn = document.createElement('button');
      const couleur = t.classe === 'teletravail' ? '#F3F4F6' : `var(--${t.var})`;
      btn.innerHTML = `<span class="pastille" style="background:${couleur}"></span>${t.libelle}`;
      btn.onclick = () => {
        const journeeEntiere = document.getElementById('chkJourneeEntiere').checked;
        proposerEnregistrement(agent, jTS, t, estMatin, journeeEntiere, absExistante, dateLisible, nomAgent);
      };
      popup.appendChild(btn);
    });
    if(absExistante){
      const btnDel = document.createElement('button');
      btnDel.className = 'supprimer';
      btnDel.textContent = 'Effacer cette absence';
      btnDel.onclick = () => supprimerAbsence(absExistante);
      popup.appendChild(btnDel);

  popup.style.display = 'block';
  const rect = evt.target.getBoundingClientRect();
  const largeurPopup = 220;
  let gauche = rect.left;
  if(gauche + largeurPopup > window.innerWidth) gauche = window.innerWidth - largeurPopup - 10;
  popup.style.left = gauche + 'px';
  popup.style.top = (rect.bottom + 4) + 'px';
}

  } else {

    groupe.innerHTML = `
      <div class="titreRadio">Moment de la journée</div>
      <label><input type="radio" name="radioJour" value="entiere" checked> Toute la journée</label>
      <label><input type="radio" name="radioJour" value="matin"> Matin</label>

// Évalue, pour chaque agent sélectionné, les conflits (type différent) et verrouillages (absence multi-jours existante)
function evaluerActionMultiple(agentsSel, jTSDebut, jTSFin, debutDemiChoisi, finDemiChoisi, typeChoisiId){
  const joursPeriode = joursEntre(jTSDebut, jTSFin);
  return agentsSel.map(agent => {
    const absencesAgent = absences.filter(ab => ab[clesAbs.agent] === agent._id);
    let verrouille = false;
    const conflits = [];
    const idsExistants = new Set();
    joursPeriode.forEach(j => {
      let matinDemande = true, apresmidiDemande = true;
      if(j === jTSDebut && debutDemiChoisi === 'Apres midi') matinDemande = false;
      if(j === jTSFin && finDemiChoisi === 'Matin') apresmidiDemande = false;
      [[true, matinDemande], [false, apresmidiDemande]].forEach(([estMatin, demande]) => {
        if(!demande) return;
        const trouve = trouverAbsencePourMoitie(absencesAgent, j, estMatin);
        if(trouve){
          if(trouve.debTS !== trouve.finTS){
            verrouille = true;
          } else {
            idsExistants.add(trouve.absence._id);
            if(normalise(trouve.absence[clesAbs.type]) !== normalise(typeChoisiId)){
              conflits.push({jour: j, demi: estMatin ? 'matin' : 'après-midi', ancienType: trouve.absence[clesAbs.type]});
            }
          }
        }
      });
    });
    return {agent, conflits, verrouille, idsExistants};
  });
}

function proposerEnregistrementMultiple(agentsSel, jTSDebut, jTSFin, debutDemi, finDemi, typeChoisi){
  const evaluation = evaluerActionMultiple(agentsSel, jTSDebut, jTSFin, debutDemi, finDemi, typeChoisi.id);
  const ignores = evaluation.filter(e => e.verrouille);
  const avecConflit = evaluation.filter(e => !e.verrouille && e.conflits.length > 0);
  const sansConflit = evaluation.filter(e => !e.verrouille && e.conflits.length === 0);

  if(avecConflit.length === 0 && ignores.length === 0){
    enregistrerAbsenceMultiple([...sansConflit, ...avecConflit], jTSDebut, jTSFin, debutDemi, finDemi, typeChoisi.id);
    return;
  }

  const popup = document.getElementById('popup');
  const nomsAgent = (e) => (e.agent[clesAgent.nom]||'') + (clesAgent.prenom && e.agent[clesAgent.prenom] ? ' ' + e.agent[clesAgent.prenom] : '');
  let html = `<div class="entete">Confirmation nécessaire</div>`;
  if(avecConflit.length > 0){
    const liste = avecConflit.slice(0, 6).map(e => nomsAgent(e)).join(', ') + (avecConflit.length > 6 ? ` +${avecConflit.length - 6} autres` : '');
    html += `<div class="info">⚠ ${avecConflit.length} agent(s) ont déjà une absence différente sur cette période, elle sera remplacée par <strong>${typeChoisi.libelle}</strong> :<br>${liste}</div>`;
  }
  if(ignores.length > 0){
    const liste = ignores.slice(0, 6).map(e => nomsAgent(e)).join(', ') + (ignores.length > 6 ? ` +${ignores.length - 6} autres` : '');
    html += `<div class="info">ℹ ${ignores.length} agent(s) ignoré(s) car déjà dans une absence multi-jours existante (à modifier depuis le tableau) :<br>${liste}</div>`;
  }
  popup.innerHTML = html;

  const btnConfirmer = document.createElement('button');
  btnConfirmer.textContent = 'Confirmer';
  btnConfirmer.style.color = 'var(--rouge)';
  btnConfirmer.onclick = () => enregistrerAbsenceMultiple([...sansConflit, ...avecConflit], jTSDebut, jTSFin, debutDemi, finDemi, typeChoisi.id);
  popup.appendChild(btnConfirmer);
  const btnAnnuler = document.createElement('button');
  btnAnnuler.textContent = 'Annuler';
  btnAnnuler.onclick = () => fermerPopup();
  popup.appendChild(btnAnnuler);
}

async function enregistrerAbsenceMultiple(evaluationsRetenues, jTSDebut, jTSFin, debutDemi, finDemi, typeChoisiId){
  fermerPopup();
  document.getElementById('statut').textContent = 'Enregistrement…';
  try{
    const actions = [];
    evaluationsRetenues.forEach(e => {
      e.idsExistants.forEach(id => actions.push(['RemoveRecord', 'Absences', id]));
      const champs = {
        [clesAbs.agent]: e.agent._id,
        [clesAbs.debut]: versTimestampGrist(jTSDebut),
        [clesAbs.fin]: versTimestampGrist(jTSFin),
        [clesAbs.type]: typeChoisiId
      };
      if(clesAbs.debutDemi) champs[clesAbs.debutDemi] = debutDemi;
      if(clesAbs.finDemi) champs[clesAbs.finDemi] = finDemi;
      actions.push(['AddRecord', 'Absences', null, champs]);
    });
    await grist.docApi.applyUserActions(actions);
  }catch(err){
    alert("Erreur lors de l'enregistrement : " + err.message);
  }
}

// Vérifie si l'action envisagée écrase une absence existante d'un type différent,
// ou touche une absence multi-jours (dans ce cas, action bloquée pour cette moitié).
function evaluerAction(agent, jTS, typeChoisi, estMatin, journeeEntiere){
  const absencesAgent = absences.filter(ab => ab[clesAbs.agent] === agent._id);
  const parties = journeeEntiere ? [true, false] : [estMatin];
  const conflits = [];
  const verrouillages = [];
  parties.forEach(m => {
    const trouve = trouverAbsencePourMoitie(absencesAgent, jTS, m);
    if(trouve){
      if(trouve.debTS !== trouve.finTS){
        verrouillages.push(m ? 'matin' : 'après-midi');
      } else if(normalise(trouve.absence[clesAbs.type]) !== normalise(typeChoisi)){
        conflits.push({demi: m ? 'matin' : 'après-midi', ancienType: trouve.absence[clesAbs.type]});
      }
    }
  });
  return {conflits, verrouillages};
}

function proposerEnregistrement(agent, jTS, typeChoisi, estMatin, journeeEntiere, absExistante, dateLisible, nomAgent){
  const {conflits, verrouillages} = evaluerAction(agent, jTS, typeChoisi.id, estMatin, journeeEntiere);

  if(verrouillages.length > 0){
    const popup = document.getElementById('popup');
    popup.innerHTML = `
      <div class="entete">${nomAgent}<br>${dateLisible}</div>
      <div class="info">⚠ Le ${verrouillages.join(' et le ')} de ce jour fait partie d'une absence sur plusieurs jours.<br>Décoche "Toute la journée" ou modifie-la depuis le tableau Absences.</div>
    `;
    return;
  }

  if(conflits.length > 0){
    const popup = document.getElementById('popup');
    const detail = conflits.map(c => `${c.demi} : <strong>${c.ancienType}</strong> → <strong>${typeChoisi.libelle}</strong>`).join('<br>');
    popup.innerHTML = `
      <div class="entete">${nomAgent}<br>${dateLisible}</div>
      <div class="info">⚠ Ceci va remplacer :<br>${detail}</div>
    `;
    const btnConfirmer = document.createElement('button');
    btnConfirmer.textContent = 'Confirmer le remplacement';
    btnConfirmer.style.color = 'var(--rouge)';
    btnConfirmer.onclick = () => enregistrerAbsence(agent, jTS, typeChoisi.id, estMatin, journeeEntiere, absExistante);
    popup.appendChild(btnConfirmer);
    const btnAnnuler = document.createElement('button');
    btnAnnuler.textContent = 'Annuler';
    btnAnnuler.onclick = () => fermerPopup();
    popup.appendChild(btnAnnuler);
    return;
  }

  enregistrerAbsence(agent, jTS, typeChoisi.id, estMatin, journeeEntiere, absExistante);
}

document.addEventListener('click', (e) => {
  if(ignorerProchainClicDocument){
    ignorerProchainClicDocument = false;
    return;
  }
  const popup = document.getElementById('popup');
  if(popup.style.display === 'block' && !popup.contains(e.target)){
    fermerPopup();
  }
});

async function enregistrerAbsence(agent, jTS, typeChoisi, estMatin, journeeEntiere, absExistante){
  fermerPopup();
  document.getElementById('statut').textContent = 'Enregistrement…';
  try{
    const ts = versTimestampGrist(jTS);

    if(journeeEntiere){
      const absencesAgent = absences.filter(ab => ab[clesAbs.agent] === agent._id);
      const idsASupprimer = new Set();
      [true, false].forEach(m => {
        const t = trouverAbsencePourMoitie(absencesAgent, jTS, m);
        if(t && t.debTS === t.finTS) idsASupprimer.add(t.absence._id);
      });
      const actions = [...idsASupprimer].map(id => ['RemoveRecord', 'Absences', id]);
      actions.push(['AddRecord', 'Absences', null, {
        [clesAbs.agent]: agent._id,
        [clesAbs.debut]: ts,
        [clesAbs.fin]: ts,
        [clesAbs.type]: typeChoisi
      }]);
      await grist.docApi.applyUserActions(actions);
    } else if(absExistante){
      await grist.docApi.applyUserActions([
        ['UpdateRecord', 'Absences', absExistante._id, {[clesAbs.type]: typeChoisi}]
      ]);
    } else {
      const valeurDemi = estMatin ? 'Matin' : 'Apres midi';
      const champs = {
        [clesAbs.agent]: agent._id,
        [clesAbs.debut]: ts,
        [clesAbs.fin]: ts,
        [clesAbs.type]: typeChoisi
      };
      if(clesAbs.debutDemi) champs[clesAbs.debutDemi] = valeurDemi;
      if(clesAbs.finDemi) champs[clesAbs.finDemi] = valeurDemi;
      await grist.docApi.applyUserActions([
        ['AddRecord', 'Absences', null, champs]
      ]);
    }
  }catch(err){
    alert("Erreur lors de l'enregistrement : " + err.message);
  }
}

function joursEntre(debTS, finTS){
  const jours = [];
  for(let t = debTS; t <= finTS; t += 86400000){
    jours.push(t);
  }
  return jours;
}

// Recalcule les fragments restants d'une absence après avoir retiré une demi-journée ou une journée
function decomposerAbsence(absence, jTSRetire, portee){
  const deb = versDate(absence[clesAbs.debut]);
  const fin = versDate(absence[clesAbs.fin]) || deb;
  const debTS = jourUTC(deb), finTS = jourUTC(fin);
  const jours = joursEntre(debTS, finTS);

  const couverture = {};
  jours.forEach(j => {
    couverture[j] = demiJourActives(absence, j, debTS, finTS);
  });

  if(portee === 'journee'){
    couverture[jTSRetire] = {matin:false, apresmidi:false};
  } else if(portee === 'demi-matin'){
    couverture[jTSRetire] = {...couverture[jTSRetire], matin:false};
  } else if(portee === 'demi-apresmidi'){
    couverture[jTSRetire] = {...couverture[jTSRetire], apresmidi:false};
  }

  const fragments = [];
  let courant = null;
  jours.forEach(j => {
    const cov = couverture[j];
    if(!cov.matin && !cov.apresmidi){
      if(courant){ fragments.push(courant); courant = null; }
      return;
    }
    if(cov.matin && cov.apresmidi){
      if(!courant) courant = {debut:j, fin:j, debutDemi:null, finDemi:null};
      else courant.fin = j;
      return;
    }
    if(cov.matin && !cov.apresmidi){
      if(!courant){
        fragments.push({debut:j, fin:j, debutDemi:null, finDemi:'Matin'});
      } else {
        courant.fin = j;
        courant.finDemi = 'Matin';
        fragments.push(courant);
        courant = null;
      }
      return;
    }
    if(courant){ fragments.push(courant); }
    courant = {debut:j, fin:j, debutDemi:'Apres midi', finDemi:null};
  });
  if(courant) fragments.push(courant);
  return fragments;
}

async function supprimerPartiel(absence, jTS, portee){
  fermerPopup();
  document.getElementById('statut').textContent = 'Suppression…';
  try{
    const fragments = decomposerAbsence(absence, jTS, portee);
    const actions = [['RemoveRecord', 'Absences', absence._id]];
    fragments.forEach(f => {
      const champs = {
        [clesAbs.agent]: absence[clesAbs.agent],
        [clesAbs.debut]: versTimestampGrist(f.debut),
        [clesAbs.fin]: versTimestampGrist(f.fin),
        [clesAbs.type]: absence[clesAbs.type]
      };
      if(clesAbs.debutDemi) champs[clesAbs.debutDemi] = f.debutDemi || '';
      if(clesAbs.finDemi) champs[clesAbs.finDemi] = f.finDemi || '';
      actions.push(['AddRecord', 'Absences', null, champs]);
    });
    await grist.docApi.applyUserActions(actions);
  }catch(err){
    alert('Erreur lors de la suppression : ' + err.message);
  }
}
